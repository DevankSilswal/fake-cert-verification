<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Fake Cert Verify</title></head>
  <body style="font-family: Arial; padding:24px;">
    <h2>Register Certificate</h2>
    <input id="issuer" placeholder="Issuer name"><br><br>
    <input id="fileReg" type="file"><button onclick="upload('/upload','fileReg','issuer')">Upload</button>

    <h2>Verify Certificate</h2>
    <input id="fileVer" type="file"><button onclick="upload('/verify','fileVer')">Verify</button>

    <pre id="out" style="background:#f7f7f7;padding:12px;border:1px solid #ddd;margin-top:18px;"></pre>
<script>
function upload(path, fileId, issuerId=null){
  const form = new FormData();
  const f = document.getElementById(fileId).files[0];
  if(!f){ alert('Select file'); return; }
  form.append('file', f);
  if(issuerId) form.append('issuer', document.getElementById(issuerId).value);
  fetch('http://localhost:5000'+path, { method:'POST', body: form })
    .then(r => r.json()).then(j => document.getElementById('out').innerText = JSON.stringify(j,null,2))
    .catch(e => document.getElementById('out').innerText = e);
}
</script>
  </body>
</html>
