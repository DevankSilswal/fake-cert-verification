version: "3"

services:

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./backend/qr_codes:/app/qr_codes   # 🔥 ADD THIS

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./backend/qr_codes:/app/qr_codes

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data: