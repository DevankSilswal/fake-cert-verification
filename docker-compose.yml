version: "3"

services:

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./backend/qr_codes:/app/qr_codes   # 🔥 ADD THIS

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./backend/qr_codes:/app/qr_codes   # 🔥 ADD THIS